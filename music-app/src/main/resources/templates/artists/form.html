<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Artist Form - Music App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/artists">🎵 Music App</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/artists">Artists</a>
            <a class="nav-link" href="/albums">Albums</a>
            <a class="nav-link" href="/concerts">Concerts</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0" th:text="${artist.id == null} ? 'Add New Artist' : 'Edit Artist'"></h5>
                </div>
                <div class="card-body">
                    <form method="post" action="/artists/save">
                        <input type="hidden" name="id" th:value="${artist.id}">

                        <div class="mb-3">
                            <label class="form-label">Name *</label>
                            <input type="text" name="name" class="form-control"
                                   th:value="${artist.name}" maxlength="100" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Type *</label>
                            <select name="type" class="form-select" required>
                                <option value="">-- Select Type --</option>
                                <option value="Solo" th:selected="${artist.type == 'Solo'}">Solo</option>
                                <option value="Band" th:selected="${artist.type == 'Band'}">Band</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Genre *</label>
                            <input type="text" name="genre" class="form-control"
                                   th:value="${artist.genre}" maxlength="50" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Country *</label>
                            <input type="text" name="country" class="form-control"
                                   th:value="${artist.country}" maxlength="60" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Formed Year *</label>
                            <input type="number" name="formedYear" class="form-control"
                                   th:value="${artist.formedYear}" min="1900" max="2026" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Bio</label>
                            <textarea name="bio" class="form-control" rows="3"
                                      maxlength="500" th:text="${artist.bio}"></textarea>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="active" value="true"
                                       class="form-check-input"
                                       th:checked="${artist.active == true}">
                                <label class="form-check-label">Active</label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">Save</button>
                            <a href="/artists" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
