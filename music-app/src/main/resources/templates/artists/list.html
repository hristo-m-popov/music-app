<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Artists - Music App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/artists">🎵 Music App</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/artists">Artists</a>
            <a class="nav-link" href="/albums">Albums</a>
            <a class="nav-link" href="/concerts">Concerts</a>
            <a class="nav-link" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Artists</h2>
        <a href="/artists/new" class="btn btn-dark">+ Add Artist</a>
    </div>

    <form method="get" action="/artists" class="row g-2 mb-4">
        <div class="col-md-4">
            <input type="text" name="genre" class="form-control"
                   placeholder="Search by genre..." th:value="${genre}">
        </div>
        <div class="col-md-4">
            <input type="text" name="country" class="form-control"
                   placeholder="Search by country..." th:value="${country}">
        </div>
        <div class="col-md-2">
            <select name="sortBy" class="form-select">
                <option value="name" th:selected="${sortBy == 'name'}">Name</option>
                <option value="genre" th:selected="${sortBy == 'genre'}">Genre</option>
                <option value="formedYear" th:selected="${sortBy == 'formedYear'}">Year</option>
                <option value="country" th:selected="${sortBy == 'country'}">Country</option>
            </select>
        </div>
        <div class="col-md-1">
            <select name="direction" class="form-select">
                <option value="asc" th:selected="${direction == 'asc'}">↑</option>
                <option value="desc" th:selected="${direction == 'desc'}">↓</option>
            </select>
        </div>
        <div class="col-md-1">
            <button type="submit" class="btn btn-dark w-100">Search</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped table-hover bg-white">
            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Genre</th>
                <th>Country</th>
                <th>Formed</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="artist : ${artists.content}">
                <td th:text="${artist.name}"></td>
                <td th:text="${artist.type}"></td>
                <td th:text="${artist.genre}"></td>
                <td th:text="${artist.country}"></td>
                <td th:text="${artist.formedYear}"></td>
                <td>
                    <span th:if="${artist.active}" class="badge bg-success">Active</span>
                    <span th:unless="${artist.active}" class="badge bg-secondary">Inactive</span>
                </td>
                <td>
                    <a th:href="@{/artists/{id}/edit(id=${artist.id})}"
                       class="btn btn-sm btn-outline-dark">Edit</a>
                    <a th:href="@{/artists/{id}/delete(id=${artist.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${artists.content.empty}">
                <td colspan="7" class="text-center text-muted">No artists found.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${artists.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${artists.first} ? 'disabled'">
                <a class="page-link" th:href="@{/artists(page=${artists.number - 1},
                   genre=${genre}, country=${country}, sortBy=${sortBy},
                   direction=${direction})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, artists.totalPages - 1)}"
                th:classappend="${i == artists.number} ? 'active'">
                <a class="page-link" th:href="@{/artists(page=${i},
                   genre=${genre}, country=${country}, sortBy=${sortBy},
                   direction=${direction})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${artists.last} ? 'disabled'">
                <a class="page-link" th:href="@{/artists(page=${artists.number + 1},
                   genre=${genre}, country=${country}, sortBy=${sortBy},
                   direction=${direction})}">Next</a>
            </li>
        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
